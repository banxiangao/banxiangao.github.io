<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
        }
        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 30px;
        }
        .paper-title {
            text-align: center;
            font-size: 20px;
            margin-bottom: 1rem;
        }
        .papers-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }
         .paper-card {
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-radius: 5px;
            padding: 15px;
            text-align: left;
            width: calc(100% );
            overflow-x: auto; /* 新增：使内容可以水平滚动 */
            white-space: nowrap; /* 新增：禁止文本换行 */
        }
        .paper-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 10px rgba(0,0,0,0.15);
        }
        .paper-link {
            color: #007bff;
            text-decoration: none;
            display: block;
        }
        .paper-link:hover {
            text-decoration: underline;
        }
    </style>
    <title>论文列表</title>
</head>
<body>
    <div class="container">
        <h1 class="paper-title">精选论文展示</h1>
        <div id="papers-list" class="row"></div>
        <nav aria-label="论文分页">
            <ul class="pagination justify-content-center mt-3"></ul>
        </nav>
    </div>

    <script>
        // 假设这是从服务器获取的论文数据
        const papersData = [
            { title: 'Beyond Typosquatting An In-depth Look at Package Confusion', link: 'typo.html' },
            { title: '论文1标题', link: '论文1链接' },
            { title: '论文1标题', link: '论文1链接' },
            { title: '论文1标题', link: '论文1链接' },
            { title: '论文1标题', link: '论文1链接' },
            { title: '论文1标题', link: '论文1链接' },
            { title: '论文1标题', link: '论文1链接' },
            { title: '论文1标题', link: '论文1链接' },
            { title: '论文1标题', link: '论文1链接' },
            { title: '论文1标题', link: '论文1链接' },
            { title: '论文1标题', link: '论文1链接' },
            { title: '论文1标题', link: '论文1链接' },
            { title: '论文1标题', link: '论文1链接' },
            { title: '论文1标题', link: '论文1链接' },
            { title: '论文1标题', link: '论文1链接' },
            { title: '论文1标题', link: '论文1链接' },
            { title: '论文1标题', link: '论文1链接' },
            { title: '论文1标题', link: '论文1链接' },
            { title: '论文1标题', link: '论文1链接' },
            { title: '论文1标题', link: '论文1链接' },
            { title: '论文1标题', link: '论文1链接' },
            { title: '论文1标题', link: '论文1链接' },
            { title: '论文N标题', link: '论文N链接' },
        ];

        let currentPage = 1;
        let itemsPerPage = 10;

        function showPapers() {
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const papersToShow = papersData.slice(start, end);

            let papersListHTML = '';
            papersToShow.forEach((paper, index) => {
                papersListHTML += `
                    <div class="col-md-6 col-lg-4 mb-3">
                        <div class="paper-card">
                            <a class="paper-link" href="${paper.link}">
                                ${paper.title}
                            </a>
                        </div>
                    </div>
                `;
            });

            document.getElementById('papers-list').innerHTML = papersListHTML;

            updatePagination();
        }

        function updatePagination() {
            const totalPages = Math.ceil(papersData.length / itemsPerPage);
            const paginationHTML = Array.from({length: totalPages}, (_, i) => `<li class="page-item ${currentPage === i + 1 ? 'active' : ''}"><a class="page-link" href="#">${i + 1}</a></li>`).join('');
            document.querySelector('.pagination').innerHTML = paginationHTML;

            // 添加分页事件监听
            document.querySelectorAll('.page-link').forEach(link => {
                link.addEventListener('click', e => {
                    e.preventDefault();
                    currentPage = parseInt(e.target.innerText);
                    showPapers();
                });
            });
        }

        // 初始化时加载第一页
        showPapers();
    </script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
