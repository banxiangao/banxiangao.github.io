<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
        }
        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 30px;
        }
        .paper-title {
            text-align: center;
            font-size: 20px;
            margin-bottom: 1rem;
        }
        .papers-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }
         .paper-card {
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-radius: 5px;
            padding: 15px;
            text-align: left;
            width: calc(100% );
            overflow-x: auto; /* 新增：使内容可以水平滚动 */
            white-space: nowrap; /* 新增：禁止文本换行 */
        }
        .paper-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 10px rgba(0,0,0,0.15);
        }
        .paper-link {
            color: #007bff;
            text-decoration: none;
            display: block;
        }
        .paper-link:hover {
            text-decoration: underline;
        }
    </style>
    <title>论文列表</title>
</head>
<body>
    <div class="container">
        <h1 class="paper-title">精选论文展示</h1>
        <div id="papers-list" class="row"></div>
        <nav aria-label="论文分页">
            <ul class="pagination justify-content-center mt-3"></ul>
        </nav>
    </div>

    <script>
        // 假设这是从服务器获取的论文数据
        const papersData = [
            { title: 'Beyond Typosquatting An In-depth Look at Package Confusion', link: 'typo.html' },
            { title: 'A Needle is an Outlier in a Haystack Hunting Malicious PyPI Packages with Code Clustering', link: 'Needle.html' },
            { title: 'An Empirical Study of Malicious Code In PyPI Ecosystem', link: 'Empirical.html' },
            { title: 'Are Code Pre-trained Models Powerful to Learn', link: 'Pre-trained.html' },
            { title: 'BERT', link: 'BERT.html' },
            { title: 'Backstabber’s Knife Collection A Review', link: 'Backstabber.html' },
            { title: 'Bad_Snakes_Understanding_and_Improving_Python_Package_Index_Malware_Scanning', link: 'Bad_Snakes.html' },
            { title: 'Exploring the Unchartered Space of Container Registry Typosquatting', link: 'Exploring.html' },
            { title: 'FastText', link: '论文1链接' },
            { title: 'LIVABLE Exploring Long-Tailed Classification of', link: '论文1链接' },
            { title: 'Malicious Package Detection in NPM and PyPI using a Single model', link: '论文1链接' },
            { title: 'Malicious_Packages_Lurking_in_User-Friendly_Python_Package_Index', link: '论文1链接' },
            { title: 'Practical Automated Detection of Malicious npm Packages', link: '论文1链接' },
            { title: 'SecureBERT', link: '论文1链接' },
            { title: 'SpellBound Defending Against Package Typosquatting', link: '论文1链接' },
            { title: 'Wolf at the Door:Preventing Install-Time Attacks in npm with Latch', link: '论文1链接' },
            { title: 'pycg', link: '论文1链接' },
            { title: '基于分片融合的代码隐式混淆技术', link: '论文1链接' },
            { title: '基于指标依赖模型构件与监控的攻击检测方法', link: '论文1链接' },
            { title: '开源软件供应链安全研究综述', link: '论文1链接' },
            { title: '开源软件供应链研究综述', link: '论文1链接' },
            { title: '论文1标题', link: '论文1链接' },
            { title: '论文N标题', link: '论文N链接' },
        ];

        let currentPage = 1;
        let itemsPerPage = 9;

        function showPapers() {
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const papersToShow = papersData.slice(start, end);

            let papersListHTML = '';
            papersToShow.forEach((paper, index) => {
                papersListHTML += `
                    <div class="col-md-6 col-lg-4 mb-3">
                        <div class="paper-card">
                            <a class="paper-link" href="${paper.link}">
                                ${paper.title}
                            </a>
                        </div>
                    </div>
                `;
            });

            document.getElementById('papers-list').innerHTML = papersListHTML;

            updatePagination();
        }

        function updatePagination() {
            const totalPages = Math.ceil(papersData.length / itemsPerPage);
            const paginationHTML = Array.from({length: totalPages}, (_, i) => `<li class="page-item ${currentPage === i + 1 ? 'active' : ''}"><a class="page-link" href="#">${i + 1}</a></li>`).join('');
            document.querySelector('.pagination').innerHTML = paginationHTML;

            // 添加分页事件监听
            document.querySelectorAll('.page-link').forEach(link => {
                link.addEventListener('click', e => {
                    e.preventDefault();
                    currentPage = parseInt(e.target.innerText);
                    showPapers();
                });
            });
        }

        // 初始化时加载第一页
        showPapers();
    </script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
